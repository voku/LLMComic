<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="A shiny robot standing alone in an empty marketplace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="flare" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c2d12" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7c2d12" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" opacity="0.08" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.38" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.55" />
  <circle cx="648" cy="219" r="352" fill="url(#glow)" />
  <g opacity="0.88">
    <path d="M0 691 C 260 640, 450 860, 770 720 S 1280 660, 1600 770" fill="none" stroke="url(#flare)" stroke-width="22" stroke-linecap="round" />
    <path d="M0 751 C 310 730, 520 890, 860 780 S 1300 730, 1600 830" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="8" stroke-linecap="round" />
  </g>

  <g transform="rotate(-27 1200 220)" opacity="0.92">
    <rect x="980" y="86" width="520" height="210" rx="24" fill="#111111" stroke="#7c2d12" stroke-width="6" />
    <rect x="1014" y="122" width="210" height="16" rx="8" fill="#7c2d12" opacity="0.92" />
    <rect x="1014" y="154" width="440" height="12" rx="6" fill="#ffffff" opacity="0.15" />
    <rect x="1014" y="182" width="380" height="12" rx="6" fill="#ffffff" opacity="0.12" />
    <rect x="1014" y="210" width="420" height="12" rx="6" fill="#ffffff" opacity="0.12" />
  </g>

  <g opacity="0.95"><rect x="-20" y="502" width="96" height="342" fill="#050505" opacity="0.78" /><rect x="130" y="454" width="122" height="390" fill="#050505" opacity="0.78" /><rect x="280" y="694" width="148" height="150" fill="#050505" opacity="0.78" /><rect x="430" y="646" width="174" height="198" fill="#050505" opacity="0.78" /><rect x="580" y="598" width="70" height="246" fill="#050505" opacity="0.78" /><rect x="730" y="550" width="96" height="294" fill="#050505" opacity="0.78" /><rect x="880" y="502" width="122" height="342" fill="#050505" opacity="0.78" /><rect x="1030" y="454" width="148" height="390" fill="#050505" opacity="0.78" /><rect x="1180" y="694" width="174" height="150" fill="#050505" opacity="0.78" /><rect x="1330" y="646" width="70" height="198" fill="#050505" opacity="0.78" /><rect x="1480" y="646" width="96" height="198" fill="#050505" opacity="0.78" /></g>
  <rect x="0" y="760" width="1600" height="140" fill="#09090b" opacity="0.85" />

  <g filter="url(#shadow)">
    <rect x="120" y="96" width="520" height="114" rx="14" fill="#7c2d12" />
    <text x="160" y="168" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="800" letter-spacing="2">WHEN REALITY ARRIVES</text>
  </g>

  <text x="180" y="282" fill="#f4f4f5" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" letter-spacing="8">COMIC PANEL</text>
  <text x="1060" y="614" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="3"><tspan x="1060" dy="0">A shiny robot standing alone in an</tspan><tspan x="1060" dy="34">empty marketplace</tspan></text>

  <g filter="url(#shadow)">
    <rect x="140" y="560" width="820" height="182" rx="18" fill="#fde047" />
    <text x="180" y="624" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700"><tspan x="180" dy="0">Even if the software works technically,</tspan><tspan x="180" dy="42">another set of problems appears. Someone</tspan><tspan x="180" dy="42">still needs to explain why the tool</tspan></text>
  </g>

  <text x="140" y="840" fill="#fca5a5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6">NOIR / SYSTEMS / INVESTIGATION</text>
</svg>